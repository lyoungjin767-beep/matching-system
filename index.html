<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>matching-system</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Malgun Gothic", sans-serif;
        color: #171717;
        background: #f5f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 48px));
        padding: 48px;
        border: 1px solid #d9dee8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(22, 34, 51, 0.08);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 6vw, 64px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #4f5b6b;
        font-size: 18px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>matching-system</h1>
      <p>Cloudflare Pages deployment is ready.</p>
    </main>
  </body>
</html>
